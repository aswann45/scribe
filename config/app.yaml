templates:
  - name: "talking_points"
    path: "templates/talking_points.docx"
    output_naming: "{amendment_number:03} - {member}.docx"
    options:
      richtext:
        sentiment:
          - when: { equals: "support" }
            style: { bold: true, color: "00B050", size: 32 }       # green
          - when: { equals: "oppose" }
            style: { bold: true, color: "CC0000", size: 32 }       # red
          - when: { equals: "no opposition" }
            style: { bold: true, color: "000000", size: 32 }       # black

  - name: "risk_report"
    path: "templates/risk_report.docx"
    output_naming: "{client}_risk_report.docx"
    options:
      richtext:
        # 2.1  Equality-based colouring
        status:
          - when: { equals: "APPROVED" }
            style: { bold: true, color: "008000" }       # green
          - when: { equals: "REJECTED" }
            style: { bold: true, color: "CC0000" }       # red

        # 2.2  Numeric ranges
        score:
          - when: { lt: 50 }
            style: { color: "008000" }
          - when: { gte: 50, lt: 80 }
            style: { color: "FFA500" }
          - when: { gte: 80 }
            style: { bold: true, color: "CC0000" }
